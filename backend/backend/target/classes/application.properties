spring.application.name=cakeshop-backend
server.port=8080

# MySQL - replace with your local credentials
spring.datasource.url=jdbc:mysql://localhost:3307/

spring.datasource.username=enterusername
spring.datasource.password=enterpassword
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# JWT - replace secret in production
app.jwt.secret=8f3
app.jwt.expiration-ms=656+56
